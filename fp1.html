<p>
지금은 과도기이다. 그래서 함수형 프로그래밍을 배우는데는 많은 오해가 있을 수 밖에 없다. 함수형 프로그래밍은 있지만, 그 것이 무엇인지 알지 못하고 얕은 단계에서 함수형을 차후에 도입한 기존의 프로그래밍에서 점만 찍으면서 함수형 프로그래밍을 하고 있다는 착각은 그 것이 착각인 것만큼 달콤할 뿐이다. 왜 함수형 프로그래밍이 있는지, 왜 근래에 함수형 프로그래밍이 의도적으로 도입되는지, 심지어는 ᆫ왜 점을 찍어야 하는지도 모르면서 점만 찍으면서도 행복할 수 있는 수준이라면 그 단계에서는 그것이 행복일 것이다.
